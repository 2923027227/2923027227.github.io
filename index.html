<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>训练结果生成器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background-color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: #667eea;
        }

        .exercises-section {
            margin: 30px 0;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .exercise-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .exercise-btn {
            padding: 12px 16px;
            border: 2px solid #667eea;
            border-radius: 25px;
            background: white;
            color: #667eea;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .exercise-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .exercise-btn.active {
            background: #667eea;
            color: white;
        }

        .selected-exercises {
            margin-top: 30px;
        }

        .exercise-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .exercise-name {
            font-weight: 600;
            font-size: 16px;
            color: #2c3e50;
        }

        .delete-exercise-btn {
            padding: 6px 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .delete-exercise-btn:hover {
            background: #c0392b;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: #667eea;
        }

        .add-set-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: all 0.3s;
        }

        .add-set-btn:hover {
            background: #5a6fd8;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .sets-list {
            margin-top: 20px;
        }

        .set-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
        }

        .set-info {
            font-size: 14px;
            color: #555;
        }

        .delete-set-btn {
            padding: 6px 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .delete-set-btn:hover {
            background: #c0392b;
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #output {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
        }

        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            transform: translateX(-50%);
            bottom: 30px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }

            .exercise-buttons {
                grid-template-columns: 1fr;
            }

            .input-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>训练结果生成器</h1>
        
        <div class="form-group">
            <select id="person" onchange="whoAreYou()">
                <option value="">选择您是谁</option>
                <option value="laowang">老王</option>
                <option value="laojin">老金</option>
            </select>
        </div>
        
        <div class="form-group">
            <select id="category" onchange="updateSubcategory()">
                <option value="">选择训练类别</option>
                <option value="strength">力量训练</option>
                <option value="cardio">有氧训练</option>
            </select>
        </div>

        <div class="form-group">
            <select id="subcategory" onchange="updateExercises()" style="display: none;">
                <option value="">选择部位</option>
            </select>
        </div>

        <div class="exercises-section" id="exercises" style="display: none;">
            <div class="section-title">选择训练动作：</div>
            <div class="exercise-buttons"></div>
        </div>

        <div class="selected-exercises">
            <div class="section-title">已选择的训练动作</div>
            <div id="selected-list"></div>
        </div>

        <button class="generate-btn" onclick="submitTrainingResult()">生成训练结果</button>
        <pre id="output"></pre>
    </div>
    
    <div id="toast" class="toast">已复制到剪贴板</div>

    <script>
        const exerciseData = {
            strength: {
                chest: {
                    name: "胸部",
                    exercises: ["杠铃卧推", "哑铃卧推", "蝴蝶机夹胸", "龙门架夹胸", "双杠臂屈伸", "上斜卧推", "俯卧撑"]
                },
                back: {
                    name: "背部",
                    exercises: ["引体向上", "划船", "高位下拉", "硬拉", "坐姿划船", "面拉"]
                },
                legs: {
                    name: "腿部",
                    exercises: ["深蹲", "腿举", "腿屈伸", "腿弯举", "弓步", "臀桥"]
                },
                shoulders: {
                    name: "肩部",
                    exercises: ["哑铃肩推", "侧平举", "前平举", "俯身飞鸟"]
                },
                arms: {
                    name: "手臂",
                    exercises: ["二头肌弯举", "三头肌下压", "锤式弯举", "窄握卧推"]
                },
                abs: {
                    name: "腹部",
                    exercises: ["仰卧起坐", "平板支撑", "卷腹", "俄罗斯转体"]
                }
            },
            cardio: {
                running: {
                    name: "跑步",
                    exercises: ["慢跑", "间歇跑", "冲刺", "上坡跑"]
                },
                cycling: {
                    name: "骑行",
                    exercises: ["动感单车", "户外骑行", "爬坡骑行"]
                },
                swimming: {
                    name: "游泳",
                    exercises: ["自由泳", "蛙泳", "仰泳", "蝶泳"]
                },
                hiit: {
                    name: "HIIT",
                    exercises: ["波比跳", "开合跳", "登山者", "深蹲跳"]
                }
            }
        };

        let selectedExercises = {
            person: "",
            exercises: []
        };

        function updateSubcategory() {
            const category = document.getElementById("category").value;
            const subcategorySelect = document.getElementById("subcategory");
            
            subcategorySelect.style.display = category ? "block" : "none";
            
            if (category) {
                subcategorySelect.innerHTML = '<option value="">选择部位</option>';
                for (let key in exerciseData[category]) {
                    subcategorySelect.innerHTML += `
                        <option value="${key}">${exerciseData[category][key].name}</option>
                    `;
                }
            }
        }

        function whoAreYou() {
            const person = document.getElementById("person").value;
            if (person) {
                selectedExercises.person = person;
                updateSelectedList();
            }
        }

        function updateExercises() {
            const category = document.getElementById("category").value;
            const subcategory = document.getElementById("subcategory").value;
            const exercisesDiv = document.getElementById("exercises");
            const buttonsContainer = exercisesDiv.querySelector('.exercise-buttons');
            
            exercisesDiv.style.display = subcategory ? "block" : "none";
            
            if (subcategory) {
                buttonsContainer.innerHTML = '';
                exerciseData[category][subcategory].exercises.forEach(exercise => {
                    buttonsContainer.innerHTML += `
                        <button class="exercise-btn" onclick="toggleExercise('${exercise}', '${category}')">${exercise}</button>
                    `;
                });
            }
        }

        function toggleExercise(exerciseName, exerciseType) {
            const button = event.target;
            const existingIndex = selectedExercises.exercises.findIndex(e => e.name === exerciseName);
            
            if (existingIndex !== -1) {
                selectedExercises.exercises.splice(existingIndex, 1);
                button.classList.remove('active');
            } else {
                selectedExercises.exercises.push({
                    name: exerciseName,
                    type: exerciseType,
                    sets: []
                });
                button.classList.add('active');
            }
            
            updateSelectedList();
        }

        function removeExercise(index) {
            const exerciseName = selectedExercises.exercises[index].name;
            selectedExercises.exercises.splice(index, 1);
            
            const exerciseButtons = document.querySelectorAll('.exercise-btn');
            exerciseButtons.forEach(btn => {
                if (btn.textContent === exerciseName) {
                    btn.classList.remove('active');
                }
            });
            
            updateSelectedList();
        }

        function addSet(index) {
            const exercise = selectedExercises.exercises[index];
            const isCardio = exercise.type === 'cardio';
            
            if (isCardio) {
                const duration = document.getElementById(`duration-${index}`).value;
                
                if (!duration) {
                    alert('请输入时长！');
                    return;
                }
                if (duration <= 0) {
                    alert('时长必须大于0！');
                    return;
                }
                
                const setNumber = exercise.sets.length + 1;
                
                exercise.sets.push({
                    setNumber,
                    duration: parseInt(duration)
                });
                
                document.getElementById(`duration-${index}`).value = '';
            } else {
                const weight = document.getElementById(`weight-${index}`).value;
                const reps = document.getElementById(`reps-${index}`).value;
                
                if (!weight || !reps) {
                    alert('请输入重量和次数！');
                    return;
                }
                if (weight <= 0 || reps <= 0) {
                    alert('重量和次数必须大于0！');
                    return;
                }
                
                const setNumber = exercise.sets.length + 1;
                
                exercise.sets.push({
                    setNumber,
                    weight: parseFloat(weight),
                    reps: parseInt(reps)
                });
                
                document.getElementById(`weight-${index}`).value = '';
                document.getElementById(`reps-${index}`).value = '';
            }
            
            updateSelectedList();
        }

        function removeSet(exerciseIndex, setIndex) {
            selectedExercises.exercises[exerciseIndex].sets.splice(setIndex, 1);
            
            selectedExercises.exercises[exerciseIndex].sets.forEach((set, index) => {
                set.setNumber = index + 1;
            });
            
            updateSelectedList();
        }

        function updateSelectedList() {
            const selectedList = document.getElementById("selected-list");
            selectedList.innerHTML = selectedExercises.exercises.map((exercise, index) => {
                const isCardio = exercise.type === 'cardio';
                return `
                <div class="exercise-item">
                    <div class="exercise-header">
                        <span class="exercise-name">${exercise.name}</span>
                        <button class="delete-exercise-btn" onclick="removeExercise(${index})">删除动作</button>
                    </div>
                    ${isCardio ? `
                    <div class="input-group">
                        <input type="number" 
                            id="duration-${index}" 
                            placeholder="时长(分钟)" 
                            min="1"
                            >
                    </div>
                    ` : `
                    <div class="input-group">
                        <input type="number" 
                            id="weight-${index}" 
                            placeholder="重量(kg)" 
                            step="0.5" 
                            min="0"
                            >
                        <input type="number" 
                            id="reps-${index}" 
                            placeholder="次数" 
                            min="1"
                            >
                    </div>
                    `}
                    <button class="add-set-btn" onclick="addSet(${index})">+</button>
                    <div class="sets-list">
                        ${exercise.sets.map((set, setIndex) => `
                            <div class="set-item">
                                <span class="set-info">${isCardio ? `第${set.setNumber}组: ${set.duration}分钟` : `第${set.setNumber}组: ${set.weight}kg x ${set.reps}次`}</span>
                                <button class="delete-set-btn" onclick="removeSet(${index}, ${setIndex})">删除此组</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `}).join('');
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "toast show";
            
            setTimeout(() => {
                toast.className = toast.className.replace("show", "");
            }, 3000);
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (err) {
                return false;
            }
        }

        async function copyTrainingPlan() {
            if (selectedExercises.exercises.length === 0) {
                alert('请先添加训练动作！');
                return;
            }
            if (!selectedExercises.person) {
                alert('请先选择用户！');
                return;
            }

            const jsonData = JSON.stringify(selectedExercises, null, 2);
            document.getElementById("output").textContent = jsonData;

            const success = await copyToClipboard(jsonData);
            
            if (success) {
                showToast();
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = jsonData;
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    document.execCommand('copy');
                    showToast();
                } catch (err) {
                    console.error('复制失败:', err);
                    alert('复制失败，请手动复制');
                } finally {
                    document.body.removeChild(textarea);
                }
            }
        }

        async function submitTrainingResult() {
            if (selectedExercises.exercises.length === 0) {
                alert('请先添加训练动作！');
                return;
            }
            if (!selectedExercises.person) {
                alert('请先选择用户！');
                return;
            }

            const generateBtn = document.querySelector('.generate-btn');
            generateBtn.disabled = true;
            generateBtn.textContent = '提交中...';

            try {
                // 构建请求参数，符合PushRecordReqNew类的格式
                const requestData = {
                    person: selectedExercises.person,
                    exercises: selectedExercises.exercises
                };

                const jsonData = JSON.stringify(requestData, null, 2);
                document.getElementById("output").textContent = jsonData;

                console.log('请求数据:', requestData);

                // 发送HTTP请求到正确的接口
                const response = await fetch('http://8.138.24.4:8081/pushRecordNew', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                console.log('响应状态:', response.status);
                
                const result = await response.json();
                console.log('响应数据:', result);
                
                if (result && result.code === 200) {
                    alert('训练结果提交成功！');
                } else {
                    alert('训练结果提交失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('提交失败:', error);
                
                if (error.message.includes('Mixed Content') || error.name === 'TypeError') {
                    alert('⚠️ 混合内容错误！\n\n请将HTML文件下载到本地，直接用浏览器打开（不要用HTTPS协议），或者配置后端使用HTTPS。\n\n当前接口URL: http://8.138.24.4:8081/pushRecordNew');
                } else {
                    alert('网络请求失败：' + error.message + '\n\n请检查网络连接或接口服务是否正常运行。');
                }
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '生成训练结果';
            }
        }
    </script>
</body>
</html>
